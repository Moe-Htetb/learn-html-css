<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 04 - CSS Animations</title>
    <link rel="stylesheet" href="10_Project_04_CSS_Animations.css" />
  </head>
  <body>
    <main class="page">
      <section class="card animated-in" aria-label="Animated profile card">
        <div class="avatar-wrap">
          <img
            class="avatar bob"
            src="img/tanjiro-kamado-red-5120x2880-22577.png"
            alt="Profile avatar"
          />
        </div>

        <h1 class="name">Animation Practice</h1>
        <p class="role">CSS transitions + keyframes</p>
        <p class="bio">
          Hover the button, watch the avatar move, and see a fade-in effect when
          the page loads.
        </p>

        <div class="actions">
          <a class="btn primary" href="#"
            >Hover me <span class="arrow" aria-hidden="true">→</span></a
          >
          <a class="btn ghost" href="#">Click effect</a>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 02 - Product Grid</title>
    <link rel="stylesheet" href="07_Project_02_Product_Grid.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Mini Shop</h1>
      <p>Simple product grid using CSS Grid</p>
    </header>

    <main class="container">
      <section class="grid">
        <article class="product-card">
          <h2>Notebook</h2>
          <p class="desc">A clean notebook for your coding notes.</p>
          <p class="price">$8.00</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <h2>Keyboard</h2>
          <p class="desc">Compact keyboard with smooth typing feel.</p>
          <p class="price">$45.00</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <h2>Headphones</h2>
          <p class="desc">Comfortable headphones for focus sessions.</p>
          <p class="price">$60.00</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <h2>Mouse</h2>
          <p class="desc">Lightweight mouse for everyday productivity.</p>
          <p class="price">$22.00</p>
          <button>Add to cart</button>
        </article>
      </section>
    </main>
  </body>
</html>

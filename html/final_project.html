<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Store</title>
    <link rel="stylesheet" href="../css/final_project.css" />
  </head>
  <body>
    <header>
      <nav class="nav-bar">
        <div class="brand-name">Digital Store</div>
        <div class="menu">
          <a href="#" class="home">Home</a>
          <a href="">Shop</a>
          <a href="">About</a>
        </div>
        <div class="user-and-cart">
          <div class="user">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
              />
            </svg>
          </div>
          <div class="cart">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
              />
            </svg>
            <span class="cart-badge">2</span>
          </div>
        </div>
      </nav>
    </header>
    <main class="container">
      <section class="hero-section">
        <div class="main-content">
          <span class="sub-heading">new collection 2026</span>
          <h1 class="heading">
            Crafted for the <span class="modern">Modern</span> Creator.
          </h1>
          <p class="content">
            Discover a curated sanctuary of premium digital tools and physical
            essentials designed to elevate your daily workflow and aesthetic
            living.
          </p>
          <div class="button-group">
            <button class="shop-now">Shop Now</button>
            <button class="view-lookbook">View Lookbook</button>
          </div>
        </div>
        <div class="hero-section-image-container">
          <img
            src="../img/herosection.png"
            alt=""
            srcset=""
            class="hero-section-image"
          />
        </div>
      </section>
    </main>
  </body>
</html>
